# Gitleaks config for ChordCoach. Extends the built-in ruleset with rules for
# this repo's specific secret shapes (see backend/.env.example), and allowlists
# the placeholder values in *.env.example / docs so they don't trip the scan.
title = "ChordCoach gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "chordcoach-deepseek-key"
description = "DeepSeek API key"
regex = '''sk-[A-Za-z0-9]{20,}'''
keywords = ["sk-"]

[[rules]]
id = "chordcoach-internal-token"
description = "ChordCoach internal API token assignment"
regex = '''(?i)\bINTERNAL_API_TOKEN\b\s*[:=]\s*['"]?[A-Za-z0-9._\-]{12,}['"]?'''
keywords = ["internal_api_token"]

[[rules]]
id = "chordcoach-otel-headers"
description = "OTLP exporter Authorization header (Basic credentials)"
regex = '''(?i)Authorization\s*=\s*Basic\s+[A-Za-z0-9+/=]{16,}'''
keywords = ["authorization=basic"]

[allowlist]
description = "Placeholders in example env files, docs and the README are not real secrets"
paths = [
  '''.*\.env\.example$''',
  '''(^|/)README\.md$''',
  '''(^|/)RENDER_MIGRATION\.md$''',
  # Test fixtures use throwaway tokens (e.g. "secret-token"), not real secrets.
  '''.*\.(test|spec)\.[tj]sx?$''',
  '''(^|/)tests?/''',
  '''.*conftest\.py$''',
]
regexes = [
  '''(?i)your[-_].*[-_](here|token|key)''',
  '''(?i)<[^>]*(token|key|secret|base64)[^>]*>''',
  '''(?i)\b(changeme|placeholder|example|dummy|xxx+)\b''',
  '''generateValue''',
]
