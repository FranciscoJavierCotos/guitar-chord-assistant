name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      eval_threshold:
        description: "Min deterministic case pass rate (0-1)"
        required: false
        default: "0.85"
      eval_judge_threshold:
        description: "Min LLM-judge case pass rate (0-1)"
        required: false
        default: "0.80"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  # Full offline eval: runs the golden set through the real agent + LLM judge.
  # Costs real DeepSeek calls, so it does NOT run automatically — it is gated to
  # manual workflow_dispatch only (trigger it from the Actions tab when you want
  # to check answer quality). The cheap DETERMINISTIC graders DO run on every PR,
  # via tests/test_eval.py in the `backend` pytest job above (no network), which
  # is what feeds the `ci` aggregator. This job is intentionally independent of
  # that aggregator so a missing secret on a fork PR can't block merges.
  eval:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Run offline eval (agent + LLM judge)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EVAL_JUDGE_MODEL: ${{ vars.EVAL_JUDGE_MODEL }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::DEEPSEEK_API_KEY secret is not set; cannot run the eval."
            exit 1
          fi
          python -m eval \
            --threshold "${{ github.event.inputs.eval_threshold || '0.85' }}" \
            --judge-threshold "${{ github.event.inputs.eval_judge_threshold || '0.80' }}" \
            --out eval/reports/report.json
      - name: Upload eval report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: backend/eval/reports/report.json
          if-no-files-found: ignore

  # Single stable status check to require in branch protection. Always runs and
  # depends on the conditional jobs, so a PR that skips one (path filter) still
  # reports green here instead of leaving a required check pending.
  ci:
    needs: [backend, frontend]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream jobs succeeded or were skipped
        run: |
          echo "backend: ${{ needs.backend.result }}"
          echo "frontend: ${{ needs.frontend.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "A required job failed."
            exit 1
          fi
